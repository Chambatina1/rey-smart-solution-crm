services:
  - type: web
    name: rey-smart-crm
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: node .next/standalone/server.js
    envVars:
      - key: DATABASE_URL
        value: file:/app/db/crm.db
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
